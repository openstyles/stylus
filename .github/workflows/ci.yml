name: ci
on:
  push:
    paths:
      - 'src/**'
      - 'tools/**'
      - '*.js' # root configs
      - 'package.json'
      - '!src/types.d.ts'
      - .github/workflows/ci.yml
    branches:
      - "**"

  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build: [chrome-mv3, firefox, mv2]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100 # to have build index in _REV
          fetch-tags: true
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'

      - run: pnpm install --ignore-scripts # ignore postinstall hook

      - name: Test & Build
        run: pnpm run-p test build-${{matrix.build}}
        if: ${{matrix.build == 'chrome-mv3'}}

      - name: Build
        run: pnpm build-${{matrix.build}}
        if: ${{matrix.build != 'chrome-mv3'}}

      - run: echo "_REV=$(git describe --abbrev=7)" >> $GITHUB_ENV
      - name: upload "${{matrix.build}}" to github
        uses: actions/upload-artifact@v7
        with:
          name: 'stylus-${{matrix.build}}-${{env._REV}}'
          path: 'dist/*'
          if-no-files-found: error
